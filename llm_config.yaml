# 🛡️ TREPAN LLM Configuration
# BYO-LLM Gateway Settings

# Provider Options:
# - groq (Default - Fastest)
# - azure_openai (Enterprise Standard)
# - openai (Standard)
# - ollama (Local / Private)
# - openai_compatible (Generic, e.g. vLLM, LM Studio)

provider: groq
model: llama-3.3-70b-versatile
temperature: 0.1
max_tokens: 3000

