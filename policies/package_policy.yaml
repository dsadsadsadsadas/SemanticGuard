# 🛡️ TREPAN Package Policy Configuration
# Supply Chain Guardian Rules

# Minimum package age (in days) before allowing installation
# Packages younger than this will be BLOCKED
min_age_days: 7

# Minimum weekly download count before warning
# Packages with fewer downloads will trigger a WARNING
min_downloads: 100

# Typosquatting detection threshold (0.0 - 1.0)
# Higher = more strict (fewer false positives, might miss some)
# Lower = more sensitive (catches more, but more false positives)
typosquat_threshold: 0.85

# Packages that are always allowed (skip all checks)
# Use for internal packages or verified dependencies
allowlist:
  # Internal packages
  # - my-internal-package
  # - company-utils

# Packages that are always blocked
# Use for known malicious or deprecated packages
blocklist:
  # Known malicious packages
  - python3-dateutil  # Typosquatting of python-dateutil
  - python-sqlite  # Malware
  - setup-tools  # Typosquatting of setuptools
  
  # Deprecated/replaced packages
  # - old-package-name

# Custom rules (future feature)
# rules:
#   - name: block_crypto_packages
#     condition: name.contains("crypto") && age_days < 30
#     action: BLOCK
#     message: "Crypto packages require manual review"
