# 🛡️ TREPAN Shadow CI - Security Gate
# This workflow blocks PRs with security vulnerabilities
# "If they bypass the local check, the PR is blocked automatically"

name: Trepan Security Scan

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    name: 🛡️ Trepan Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Trepan Scanner
        run: |
          python -m pip install --upgrade pip
          # Install Trepan as a package (when published)
          # pip install trepan-security
          # For now, copy ci_scanner.py to the repo
          echo "Using local ci_scanner.py"
      
      - name: 🔍 Run Security Scan
        id: scan
        run: |
          python ci_scanner.py \
            --path . \
            --format sarif \
            --output trepan-results.sarif \
            --fail-on critical \
            --extensions .py .js .ts
        continue-on-error: true
      
      - name: 📊 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trepan-results.sarif
          category: trepan-security
      
      - name: 💬 Comment on PR with Results
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read SARIF results
            let results = [];
            try {
              const sarif = JSON.parse(fs.readFileSync('trepan-results.sarif', 'utf8'));
              results = sarif.runs[0].results || [];
            } catch (e) {
              console.log('Could not parse SARIF:', e);
            }
            
            // Build comment body
            let body = '## 🛡️ Trepan Security Scan Failed\n\n';
            body += '> **This PR has been blocked due to security vulnerabilities.**\n\n';
            
            if (results.length > 0) {
              body += '### Issues Found:\n\n';
              body += '| File | Line | Issue |\n';
              body += '|------|------|-------|\n';
              
              for (const result of results.slice(0, 10)) {
                const loc = result.locations?.[0]?.physicalLocation;
                const file = loc?.artifactLocation?.uri || 'unknown';
                const line = loc?.region?.startLine || '?';
                const msg = result.message?.text || 'Unknown issue';
                body += `| \`${file}\` | ${line} | ${msg} |\n`;
              }
              
              if (results.length > 10) {
                body += `\n*...and ${results.length - 10} more issues*\n`;
              }
            }
            
            body += '\n### How to Fix:\n';
            body += '1. Review the issues in the **Security** tab\n';
            body += '2. Run `python ci_scanner.py --path .` locally\n';
            body += '3. Fix all critical/high severity issues\n';
            body += '4. Push your fixes\n';
            
            // Post or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const trepanComment = comments.find(c => 
              c.body.includes('🛡️ Trepan Security Scan')
            );
            
            if (trepanComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: trepanComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
      
      - name: ❌ Fail if Critical Issues
        if: steps.scan.outcome == 'failure'
        run: |
          echo "🛑 Security scan failed - blocking merge"
          exit 1
      
      - name: ✅ Security Check Passed
        if: steps.scan.outcome == 'success'
        run: |
          echo "✅ No critical security issues found"

  # Optional: Block merge if security scan fails
  required-check:
    name: 🚦 Security Gate
    needs: security-scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check scan result
        run: |
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "🛑 Security gate BLOCKED - fix vulnerabilities before merging"
            exit 1
          fi
          echo "✅ Security gate PASSED"
